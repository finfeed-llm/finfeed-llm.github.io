name: Daily news scrape

on:
  schedule:
    # GitHub cron is UTC and has no DST awareness, so we fire at both
    # 14:00 UTC (= 9am CDT, summer) and 15:00 UTC (= 9am CST, winter).
    # A guard step below only proceeds when it is actually 9am in Texas.
    - cron: "0 14 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      TZ: America/Chicago
    steps:
      - name: Is it 9am in Texas?
        id: gate
        run: |
          hour="$(date +%H)"
          echo "Local Texas time: $(date)"
          if [ "$hour" = "09" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not 9am Central (hour=$hour) — skipping."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.go == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.gate.outputs.go == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.gate.outputs.go == 'true'
        run: pip install -r requirements.txt

      - name: Scrape headlines
        if: steps.gate.outputs.go == 'true'
        run: python scripts/fetch_news.py

      - name: Commit & push if changed
        if: steps.gate.outputs.go == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "news: update headlines $(date +'%B %-d')"
            git push
          fi
