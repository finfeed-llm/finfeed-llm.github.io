<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FinFeed — Market Headlines</title>
  <meta name="description" content="A clean daily feed of top market headlines. Titles only, no noise." />
  <meta name="theme-color" content="#0b0f17" />

  <link rel="alternate" type="application/rss+xml" title="FinFeed RSS" href="./llm.xml" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 17l5-5 4 3 7-8" />
          <path d="M16 4h5v5" />
        </svg>
      </span>
      <div class="brand-text">
        <h1>FinFeed</h1>
        <p>Top market headlines</p>
      </div>
    </div>
    <div class="meta">
      <span id="updated" class="updated"></span>
      <button id="refresh" class="refresh" title="Refresh" aria-label="Refresh">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-2.64-6.36" />
          <path d="M21 3v6h-6" />
        </svg>
      </button>
    </div>
  </header>

  <main id="feed" class="feed" aria-live="polite">
    <div class="skeleton-wrap" id="skeleton">
      <div class="sk-date"></div>
      <div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div>
      <div class="sk-line short"></div>
    </div>
  </main>

  <footer class="footer">
    <span>Source: Finviz · Headlines only</span>
    <span class="foot-links">
      <a href="./llm.xml">RSS</a>
      <a href="https://github.com/finfeed-llm/finfeed-llm.github.io" target="_blank" rel="noopener">GitHub</a>
    </span>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
